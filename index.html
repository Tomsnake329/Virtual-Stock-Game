<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>虛擬股票遊戲 MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>虛擬股票遊戲（MVP）</h1>
      <p>僅使用遊戲幣，不涉及真實券商下單。</p>
      <p class="muted">資料模式：<code>?provider=auto</code>（預設：TWSE→mock 備援）或 <code>?provider=mock</code>。</p>
    </header>

    <main class="grid">
      <section class="card" id="portfolio-summary"></section>

      <section class="card">
        <h2>市場報價</h2>
        <p class="muted">每 3 秒更新一次。</p>
        <table>
          <thead>
            <tr>
              <th>代號</th>
              <th>名稱</th>
              <th>最新價</th>
              <th>漲跌</th>
              <th>漲跌幅</th>
              <th>時間</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="stock-table-body"></tbody>
        </table>
      </section>

      <section class="card">
        <h2>下單面板</h2>
        <form id="trade-form">
          <label>
            股票代號
            <select name="symbol" id="trade-symbol"></select>
          </label>
          <label>
            方向
            <select name="side">
              <option value="buy">買進</option>
              <option value="sell">賣出</option>
            </select>
          </label>
          <label>
            數量
            <input type="number" name="quantity" min="1" value="1" required />
          </label>
          <button type="submit">送出委託</button>
        </form>
        <p id="trade-feedback" class="muted"></p>
      </section>

      <section class="card">
        <h2>每日二選一預測</h2>
        <p id="prediction-question"></p>
        <form id="prediction-form">
          <label>
            方向
            <select name="prediction" required>
              <option value="green">收紅（上漲）</option>
              <option value="red">收黑（下跌）</option>
            </select>
          </label>
          <label>
            下注金額（遊戲幣）
            <input type="number" name="wager" min="1" value="100" required />
          </label>
          <button type="submit">送出預測</button>
          <button type="button" id="settle-day">結算當日（示範）</button>
        </form>
        <div id="prediction-status" class="muted"></div>
      </section>

      <section class="card">
        <h2>持倉</h2>
        <table>
          <thead>
            <tr>
              <th>代號</th>
              <th>股數</th>
              <th>均價</th>
              <th>市值</th>
              <th>未實現損益</th>
            </tr>
          </thead>
          <tbody id="holdings-body"></tbody>
        </table>
      </section>

      <section class="card">
        <h2>交易紀錄</h2>
        <table>
          <thead>
            <tr>
              <th>時間</th>
              <th>方向</th>
              <th>代號</th>
              <th>股數</th>
              <th>價格</th>
              <th>總額</th>
            </tr>
          </thead>
          <tbody id="trade-history-body"></tbody>
        </table>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
